[tool.ruff]
target-version = "py313"
line-length = 88
exclude = [
    "metabase",
    "notebooks",
]

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.13"
files = [
    "src",
    "dags",
]
mypy_path = "src"
explicit_package_bases = true
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
show_error_codes = true

[tool.pytest.ini_options]
pythonpath = [
    "src",
]
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
]
python_classes = [
    "Test*",
]
python_functions = [
    "test_*",
]
addopts = "-ra"
